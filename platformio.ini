[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
	pololu/VL53L0X@^1.3.1
	adafruit/Adafruit TCS34725@^1.4.4
	adafruit/Adafruit BusIO@^1.17.4
	links2004/WebSockets@^2.7.3
